name: CI — Validate and auto-merge upload PRs

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate uploaded modules
    runs-on: ubuntu-latest

    if: startsWith(github.head_ref, 'upload/')

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate all .py files in PR
        id: validate
        run: |
          git fetch origin main --depth=1

          # Get all .py files changed in this PR
          FILES=$(git diff --name-only origin/main HEAD -- '*.py' || true)

          echo "Files to check:"
          echo "$FILES"

          if [ -z "$FILES" ]; then
            echo "No .py files in this PR — nothing to validate."
            echo "passed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          FAILED=0
          SYNTAX_ERRORS=""
          IMPORT_ERRORS=""

          DANGEROUS="os.system subprocess. eval( exec( pickle.loads marshal.loads ctypes __import__("

          for FILE in $FILES; do
            if [ ! -f "$FILE" ]; then
              continue
            fi

            echo "Checking syntax: $FILE"
            SYNTAX_OUT=$(python3 -c "
import ast, sys
try:
    with open('$FILE') as f:
        ast.parse(f.read())
    print('OK')
except SyntaxError as e:
    print(f'line {e.lineno}: {e.msg}')
    sys.exit(1)
" 2>&1)

            if [ $? -ne 0 ]; then
              FAILED=1
              SYNTAX_ERRORS="$SYNTAX_ERRORS\n- \`$FILE\`: $SYNTAX_OUT"
            fi

            echo "Checking imports: $FILE"
            for PATTERN in $DANGEROUS; do
              if grep -qF "$PATTERN" "$FILE" 2>/dev/null; then
                FAILED=1
                IMPORT_ERRORS="$IMPORT_ERRORS\n- \`$FILE\`: contains \`$PATTERN\`"
              fi
            done
          done

          if [ $FAILED -ne 0 ]; then
            echo "passed=false" >> $GITHUB_OUTPUT
            echo "syntax_errors<<EOF" >> $GITHUB_OUTPUT
            printf "$SYNTAX_ERRORS" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "import_errors<<EOF" >> $GITHUB_OUTPUT
            printf "$IMPORT_ERRORS" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "passed=true" >> $GITHUB_OUTPUT
          fi

      - name: Auto-merge PR
        if: steps.validate.outputs.passed == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          echo "All checks passed — merging PR"
          gh pr merge ${{ github.event.pull_request.number }} \
            --squash \
            --delete-branch \
            --subject "Auto-merge: ${{ github.event.pull_request.title }}"

      - name: Close PR on failure
        if: steps.validate.outputs.passed != 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          COMMENT="## Automated checks failed

          This pull request was automatically closed because the uploaded module did not pass validation.

          **Syntax errors:**
          ${{ steps.validate.outputs.syntax_errors || 'None' }}

          **Dangerous pattern errors:**
          ${{ steps.validate.outputs.import_errors || 'None' }}

          Please fix the issues and re-upload through the OpenForge website."

          gh pr comment ${{ github.event.pull_request.number }} --body "$COMMENT"
          gh pr close ${{ github.event.pull_request.number }} --delete-branch
