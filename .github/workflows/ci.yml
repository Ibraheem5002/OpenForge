name: CI — Validate and auto-merge upload PRs

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate uploaded modules
    runs-on: ubuntu-latest

    if: startsWith(github.head_ref, 'upload/')

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate all .py files in PR
        id: validate
        run: |
          git fetch origin main --depth=1
          FILES=$(git diff --name-only origin/main HEAD -- '*.py' || true)
          echo "Files found: $FILES"

          if [ -z "$FILES" ]; then
            echo "passed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          FAILED=0
          SYNTAX_ERRORS=""
          IMPORT_ERRORS=""

          for FILE in $FILES; do
            [ ! -f "$FILE" ] && continue

            python3 - "$FILE" << 'PYEOF'
          import ast, sys
          with open(sys.argv[1]) as f:
              src = f.read()
          try:
              ast.parse(src)
          except SyntaxError as e:
              print(f"SYNTAX:{sys.argv[1]}:line {e.lineno}: {e.msg}")
              sys.exit(1)
          PYEOF

            if [ $? -ne 0 ]; then
              FAILED=1
              SYNTAX_ERRORS="${SYNTAX_ERRORS} ${FILE}"
            fi

            for PATTERN in "os.system" "subprocess." "eval(" "exec(" "pickle.loads" "marshal.loads" "ctypes" "__import__("; do
              if grep -qF "$PATTERN" "$FILE" 2>/dev/null; then
                FAILED=1
                IMPORT_ERRORS="${IMPORT_ERRORS} ${FILE}:${PATTERN}"
              fi
            done
          done

          if [ $FAILED -ne 0 ]; then
            echo "passed=false" >> $GITHUB_OUTPUT
            echo "syntax_errors=${SYNTAX_ERRORS}" >> $GITHUB_OUTPUT
            echo "import_errors=${IMPORT_ERRORS}" >> $GITHUB_OUTPUT
          else
            echo "passed=true" >> $GITHUB_OUTPUT
          fi

      - name: Auto-merge PR
        if: steps.validate.outputs.passed == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --squash \
            --delete-branch \
            --subject "Auto-merge: ${{ github.event.pull_request.title }}"

      - name: Close PR on failure
        if: steps.validate.outputs.passed != 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body "Automated checks failed. Syntax errors: ${{ steps.validate.outputs.syntax_errors }} Dangerous patterns: ${{ steps.validate.outputs.import_errors }}"
          gh pr close ${{ github.event.pull_request.number }} --delete-branch
  
  auto-merge-delete:
    name: Auto-merge delete PRs
    runs-on: ubuntu-latest

    if: startsWith(github.head_ref, 'delete/')

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Auto-merge delete PR
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --squash \
            --delete-branch \
            --subject "Auto-merge: ${{ github.event.pull_request.title }}" \
            --repo ${{ github.repository }}
